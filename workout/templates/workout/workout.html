<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운동 측정 — PoseFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #4285F4; --blue-dark: #3367D6;
      --red: #EA4335; --green: #34A853; --yellow: #FBBC04;
      --text: #202124; --text-secondary: #5F6368;
      --border: #DADCE0; --bg: #F8F9FA; --white: #FFFFFF;
      --shadow: 0 1px 3px rgba(60,64,67,.15), 0 4px 8px rgba(60,64,67,.10);
    }
    body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* 헤더 */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 64px;
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 100;
    }
    .brand { font-family: 'Google Sans', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .brand .fit { color: var(--blue); } .brand .face { color: var(--text); }
    [data-theme="dark"] {
      --text: #E8EAED; --text-secondary: #9AA0A6;
      --border: #3C4043; --bg: #202124; --white: #292A2D;
    }
    .theme-toggle { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: 0.85rem; color: var(--text-secondary); transition: background .15s; }
    .theme-toggle:hover { background: var(--bg); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-text { background: none; border: none; color: var(--blue); font-size: 0.875rem; font-weight: 500; font-family: 'Google Sans', sans-serif; cursor: pointer; padding: 8px 12px; border-radius: 4px; text-decoration: none; }
    .btn-text:hover { background: #F6FAFE; }
    .btn-contained { background: var(--blue); color: #fff; border: none; font-size: 0.875rem; font-weight: 500; font-family: 'Google Sans', sans-serif; cursor: pointer; padding: 8px 20px; border-radius: 4px; text-decoration: none; }
    .btn-contained:hover { background: var(--blue-dark); }
    .btn-outlined { background: transparent; color: var(--blue); border: 1px solid var(--border); font-size: 0.875rem; font-weight: 500; font-family: 'Google Sans', sans-serif; cursor: pointer; padding: 8px 20px; border-radius: 4px; text-decoration: none; }
    .btn-outlined:hover { background: #F6FAFE; }
    .btn-danger { background: var(--red); color: #fff; border: none; font-size: 0.875rem; font-weight: 500; font-family: 'Google Sans', sans-serif; cursor: pointer; padding: 8px 20px; border-radius: 4px; }
    .btn-danger:hover { background: #C62828; }

    /* 레이아웃 */
    .layout { padding-top: 64px; display: flex; height: 100vh; }
    .sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--white); border-right: 1px solid var(--border);
      padding: 24px 20px; display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto;
    }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; background: #000; }
    video { max-height: calc(100vh - 112px); max-width: 100%; border-radius: 4px; display: block; }

    /* 사이드바 컴포넌트 */
    .sidebar-section { }
    .sidebar-label { font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }

    select {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 0.9rem; font-family: 'Roboto', sans-serif;
      background: var(--white); color: var(--text); outline: none;
    }
    select:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(66,133,244,.15); }

    .stat-card {
      background: var(--bg); border-radius: 8px; padding: 14px 16px;
    }
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    .stat-value { font-size: 0.95rem; font-weight: 500; color: var(--text); }

    .stage-chip {
      display: inline-block; padding: 3px 12px; border-radius: 12px;
      font-size: 0.8rem; font-weight: 500;
      background: #E8EAED; color: var(--text-secondary);
    }
    .stage-chip.BOTTOM     { background: #FCE8E6; color: var(--red); }
    .stage-chip.GOING_DOWN { background: #FEF7E0; color: #E37400; }
    .stage-chip.GOING_UP   { background: #E6F4EA; color: var(--green); }
    .stage-chip.STANDING   { background: #E8F0FE; color: var(--blue); }

    .score-display {
      text-align: center; padding: 16px 0;
    }
    .score-number { font-family: 'Google Sans', sans-serif; font-size: 3rem; font-weight: 400; color: var(--blue); line-height: 1; }
    .score-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }

    .angles-box { font-size: 0.78rem; color: var(--text-secondary); line-height: 2; }

    .btn-full { width: 100%; padding: 11px; border-radius: 4px; font-size: 0.9rem; font-weight: 500; font-family: 'Google Sans', sans-serif; cursor: pointer; border: none; margin-top: 4px; }

    /* 모달 */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(32,33,36,.6); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--white); border-radius: 8px;
      padding: 40px 48px; min-width: 340px; text-align: center;
      box-shadow: 0 24px 48px rgba(0,0,0,.2);
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-title { font-family: 'Google Sans', sans-serif; font-size: 1.3rem; font-weight: 400; color: var(--text); margin-bottom: 6px; }
    .modal-score { font-family: 'Google Sans', sans-serif; font-size: 4rem; font-weight: 300; color: var(--blue); margin: 12px 0; }
    .modal-sub { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 28px; }
    .modal-actions { display: flex; gap: 12px; justify-content: center; }
  </style>
</head>
<body>

<header>
  <span class="brand"><a href="/dashboard/" style="text-decoration:none;"><span class="fit">Pose</span><span class="face">Fit</span></a></span>
  <div class="header-actions">
    <span style="font-size:0.85rem;color:var(--text-secondary);">{{ username }}</span>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 다크</button>
    <a href="/dashboard/" class="btn-text">← 홈</a>
    <a href="/workout/feedback/" class="btn-outlined">피드백</a>
  </div>
</header>

<div class="layout">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">운동 선택</div>
      <select id="exercise-select">
        {% for value, label in exercises %}
          <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn-full btn-contained" id="btn-start" onclick="startSet()">▶ 세트 시작</button>
      <button class="btn-full btn-danger" id="btn-finish" onclick="finishSet()" style="display:none;">■ 세트 종료</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">현황</div>
      <div class="stat-card">
        <div class="stat-row">
          <span class="stat-label">단계</span>
          <span class="stage-chip" id="stage-chip">대기 중</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">세트</span>
          <span class="stat-value"><span id="set-num">0</span>세트</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">횟수</span>
          <span class="stat-value"><span id="rep-count">0</span>회</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">최근 점수</div>
      <div class="score-display">
        <div class="score-number" id="last-score">—</div>
        <div class="score-label">점 (마지막 Rep)</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">관절 각도</div>
      <div class="angles-box" id="angles-text">—</div>
    </div>
  </aside>

  <!-- 웹캠 -->
  <main class="main">
    <video id="video" autoplay playsinline></video>
  </main>
</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<!-- 세트 완료 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">세트 <span id="modal-set-num"></span> 완료</div>
    <div class="modal-score"><span id="modal-score"></span></div>
    <div class="modal-sub">점 · 세트 평균 점수</div>
    <div class="modal-actions">
      <button class="btn-outlined" onclick="continueWorkout()" style="padding:10px 24px;">다음 세트</button>
      <button class="btn-contained" onclick="endWorkout()" style="padding:10px 24px;">피드백 보기 →</button>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let streaming = false, setNumber = 0, frameInterval = null;
  let currentExercise = '';

  // rep 단위 녹화 (GOING_DOWN 시작 → rep 완료 시 저장)
  let stream = null;
  let repRecorder = null;
  let repChunks = [];
  let isRecordingRep = false;
  let prevStage = '';
  const MIME = MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
    ? 'video/webm;codecs=vp8' : 'video/webm';

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
      stream = s;
      video.srcObject = s;
    });

  function getCookie(name) {
    const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : null;
  }

  async function startSet() {
    const exercise = document.getElementById('exercise-select').value;
    const res = await fetch('/api/workout/start/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ exercise }),
    });
    const data = await res.json();
    if (!data.ok) { alert(data.error); return; }

    setNumber += 1;
    document.getElementById('set-num').textContent = setNumber;
    document.getElementById('rep-count').textContent = 0;
    document.getElementById('last-score').textContent = '—';
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-finish').style.display = 'block';
    document.getElementById('exercise-select').disabled = true;
    currentExercise = exercise;
    rollingChunks = [];
    streaming = true;
    frameInterval = setInterval(sendFrame, 200);
  }

  async function sendFrame() {
    if (!streaming) return;
    ctx.drawImage(video, 0, 0, 640, 480);
    const image = canvas.toDataURL('image/jpeg', 0.7);
    const res = await fetch('/api/workout/frame/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ image }),
    });
    const data = await res.json();
    if (!data.ok || !data.detected) return;

    const chip = document.getElementById('stage-chip');
    chip.textContent = data.stage;
    chip.className = 'stage-chip ' + data.stage;
    document.getElementById('rep-count').textContent = data.rep_count;
    if (data.last_score !== undefined) document.getElementById('last-score').textContent = data.last_score;
    document.getElementById('angles-text').innerHTML =
      Object.entries(data.angles).map(([k, v]) => `<div><b>${k}</b>: ${v}°</div>`).join('');

    // 단계 전환 감지
    const stage = data.stage;
    if (prevStage === 'STANDING' && (stage === 'GOING_DOWN' || stage === 'BOTTOM')) {
      startRepRecording();
    }
    prevStage = stage;

    // rep 완료 → 녹화 중단 후 저장
    if (data.score !== null) {
      stopAndSaveClip(data.rep_count, data.score);
    }
  }

  async function finishSet() {
    streaming = false;
    clearInterval(frameInterval);
    const res = await fetch('/api/workout/finish/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ set_number: setNumber }),
    });
    const data = await res.json();
    if (!data.ok) { alert(data.error); return; }
    document.getElementById('modal-set-num').textContent = setNumber;
    document.getElementById('modal-score').textContent = data.saved_score;
    document.getElementById('modal').classList.add('show');
    document.getElementById('btn-finish').style.display = 'none';
  }

  function continueWorkout() {
    document.getElementById('modal').classList.remove('show');
    document.getElementById('btn-start').style.display = 'block';
    document.getElementById('exercise-select').disabled = false;
  }

  function endWorkout() { location.href = '/workout/feedback/'; }

  function startRepRecording() {
    if (isRecordingRep || !stream) return;
    repChunks = [];
    repRecorder = new MediaRecorder(stream, { mimeType: MIME });
    repRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) repChunks.push(e.data); };
    repRecorder.start(200);
    isRecordingRep = true;
  }

  function stopAndSaveClip(repNumber, score) {
    if (!isRecordingRep || !repRecorder) return;
    repRecorder.onstop = async () => {
      if (!repChunks.length) return;
      const blob = new Blob(repChunks, { type: 'video/webm' });
      const form = new FormData();
      form.append('video', blob, `rep_${repNumber}.webm`);
      form.append('rep_number', repNumber);
      form.append('score', score);
      form.append('exercise', currentExercise);
      form.append('csrfmiddlewaretoken', getCookie('csrftoken'));
      await fetch('/api/workout/save_clip/', { method: 'POST', body: form });
    };
    repRecorder.stop();
    isRecordingRep = false;
  }

  (function() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
  })();
  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.querySelectorAll('.theme-toggle').forEach(btn => {
      btn.textContent = next === 'dark' ? '☀️ 라이트' : '🌙 다크';
    });
  }
  document.addEventListener('DOMContentLoaded', () => {
    const theme = localStorage.getItem('theme') || 'light';
    document.querySelectorAll('.theme-toggle').forEach(btn => {
      btn.textContent = theme === 'dark' ? '☀️ 라이트' : '🌙 다크';
    });
  });
</script>
</body>
</html>
