{% extends "accounts/base.html" %}
{% block title %}로그인 - 얼굴 인식{% endblock %}

{% block body %}
<div class="card">
  <h1>얼굴 인식 로그인</h1>
  <p class="subtitle">카메라를 바라보면 자동으로 인식됩니다.</p>

  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay" class="overlay"></canvas>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="confirmBar" style="width:0%"></div>
  </div>

  <div class="status" id="status">카메라 연결 중...</div>

  <div id="successBox" class="success-box" style="display:none">
    <div class="icon">✅</div>
    <h2 id="welcomeMsg"></h2>
    <p style="color:#888;margin-bottom:20px;">잠시 후 이동합니다...</p>
  </div>

  <div class="nav-links">
    계정이 없으신가요? <a href="{% url 'register' %}">얼굴 등록</a>
  </div>
</div>

<script>
const HOLD_FRAMES = 12;

// 전송용 캔버스 (320x240 고정 → 서버 처리 빠름)
const sendCanvas = document.createElement('canvas');
sendCanvas.width = 320; sendCanvas.height = 240;
const sendCtx = sendCanvas.getContext('2d');

let confirmCount = 0;
let running = true;
let scaleX = 1, scaleY = 1;  // 서버 좌표 → 화면 좌표 변환 비율

const video   = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx     = overlay.getContext('2d');
const status  = document.getElementById('status');
const bar     = document.getElementById('confirmBar');

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
  video.srcObject = stream;
  video.addEventListener('loadedmetadata', () => {
    overlay.width  = video.videoWidth;
    overlay.height = video.videoHeight;
    // 서버에 320x240 전송 → 받은 bbox를 원본 해상도로 스케일업
    scaleX = video.videoWidth  / 320;
    scaleY = video.videoHeight / 240;
    status.textContent = '얼굴을 정면으로 바라보세요.';
    status.className = 'status';
    loop();
  });
}

function captureBase64() {
  sendCtx.drawImage(video, 0, 0, 320, 240);
  return sendCanvas.toDataURL('image/jpeg', 0.65);
}

// bbox: [x, y, w, h] (320x240 기준) → 화면 크기로 변환 후 그리기
function drawBox(bbox, color, label) {
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  if (!bbox) return;
  const [x, y, w, h] = bbox;
  const rx = x * scaleX, ry = y * scaleY, rw = w * scaleX, rh = h * scaleY;

  // 바깥 반투명 박스
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.strokeRect(rx, ry, rw, rh);

  // 모서리 강조선
  const cs = 18;
  ctx.lineWidth = 4;
  [
    [rx, ry, cs, 0, 0, cs],
    [rx + rw, ry, -cs, 0, 0, cs],
    [rx, ry + rh, cs, 0, 0, -cs],
    [rx + rw, ry + rh, -cs, 0, 0, -cs],
  ].forEach(([sx, sy, dx1, dy1, dx2, dy2]) => {
    ctx.beginPath();
    ctx.moveTo(sx + dx1, sy + dy1); ctx.lineTo(sx, sy); ctx.lineTo(sx + dx2, sy + dy2);
    ctx.stroke();
  });

  // 이름 라벨
  if (label) {
    ctx.font = 'bold 15px Arial';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = color;
    ctx.fillRect(rx, ry - 26, tw + 16, 24);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, rx + 8, ry - 8);
  }
}

async function loop() {
  if (!running) return;
  try {
    const res = await fetch("{% url 'api_login_frame' %}", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ image: captureBase64() }),
    });
    const data = await res.json();

    if (!data.ok) {
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      status.textContent = '등록된 얼굴이 없습니다.';
      status.className = 'status err';
      confirmCount = 0;
    } else if (data.matched) {
      confirmCount++;
      const pct = Math.min(100, (confirmCount / HOLD_FRAMES) * 100);
      bar.style.width = pct + '%';
      status.textContent = `${data.username} 인식됨`;
      status.className = 'status ok';
      drawBox(data.bbox, '#00e676', data.username);

      if (confirmCount >= HOLD_FRAMES) {
        running = false;
        showSuccess(data.username);
        return;
      }
    } else {
      confirmCount = Math.max(0, confirmCount - 1);
      bar.style.width = (confirmCount / HOLD_FRAMES * 100) + '%';
      if (data.bbox) {
        status.textContent = '인식 중...';
        status.className = 'status';
        drawBox(data.bbox, '#f44336', null);
      } else {
        status.textContent = '얼굴을 화면 중앙에 위치시키세요.';
        status.className = 'status';
        ctx.clearRect(0, 0, overlay.width, overlay.height);
      }
    }
  } catch (e) {
    // 네트워크 오류는 조용히 무시하고 재시도
  }
  setTimeout(loop, 100);  // 100ms 후 다음 요청 (카메라 새 프레임 확보)
}

function showSuccess(username) {
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  document.querySelector('.video-wrap').style.display = 'none';
  document.querySelector('.progress-bar-wrap').style.display = 'none';
  document.getElementById('successBox').style.display = 'block';
  document.getElementById('welcomeMsg').textContent = `환영합니다, ${username}!`;
  setTimeout(() => { location.href = "{% url 'dashboard' %}"; }, 1800);
}

function getCookie(name) {
  const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
  return v ? v[2] : null;
}

startCamera().catch(() => {
  status.textContent = '카메라 접근 권한이 필요합니다.';
  status.className = 'status err';
});
</script>
{% endblock %}
