<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}얼굴 인식 로그인{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 { font-size: 1.6rem; margin-bottom: 6px; color: #fff; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 28px; }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #3a3a5a;
      background: #12122a;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    input[type="text"]:focus { outline: none; border-color: #6c63ff; }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity .2s;
      text-decoration: none;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #6c63ff; color: #fff; width: 100%; text-align: center; }
    .btn-secondary { background: #2a2a4a; color: #ccc; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .video-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin-bottom: 20px;
    }
    video, canvas.overlay {
      display: block;
      width: 100%;
    }
    canvas.overlay {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }

    .progress-bar-wrap {
      background: #2a2a4a;
      border-radius: 8px;
      height: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #6c63ff;
      border-radius: 8px;
      transition: width .3s;
    }

    .status {
      text-align: center;
      min-height: 24px;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .status.ok { color: #4caf50; }
    .status.warn { color: #ff9800; }
    .status.err { color: #f44336; }

    .nav-links { margin-top: 20px; text-align: center; font-size: 0.9rem; color: #888; }
    .nav-links a { color: #6c63ff; text-decoration: none; }
    .nav-links a:hover { text-decoration: underline; }

    .success-box {
      text-align: center;
      padding: 32px;
    }
    .success-box .icon { font-size: 3rem; margin-bottom: 12px; }
    .success-box h2 { font-size: 1.4rem; color: #4caf50; margin-bottom: 8px; }

    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #2a2a4a; font-size: 0.9rem; }
    th { color: #888; font-weight: 500; }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    .top-bar .brand { font-weight: 700; color: #6c63ff; }

    .page { padding-top: 70px; width: 100%; display: flex; justify-content: center; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
