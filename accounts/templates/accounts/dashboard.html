{% extends "accounts/base.html" %}
{% block title %}홈 — PoseFit{% endblock %}

{% block body %}
<div class="top-bar">
  <span class="brand"><a href="/dashboard/" style="text-decoration:none;"><span class="fit">Pose</span><span class="face">Fit</span></a></span>
  <div style="display:flex;gap:8px;align-items:center;">
    <span style="font-size:0.85rem;color:var(--text-secondary);">{{ username }}님</span>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 다크</button>
    <a href="{% url 'logout' %}" class="btn btn-secondary" style="padding:7px 16px;font-size:0.85rem;">로그아웃</a>
  </div>
</div>

<div class="page">
  <div style="width:100%;max-width:640px;padding:32px 16px;">

    <!-- 환영 배너 -->
    <div style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:28px 32px;margin-bottom:16px;display:flex;align-items:center;gap:20px;">
      <div style="width:48px;height:48px;border-radius:50%;background:#E8F0FE;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">👤</div>
      <div>
        <div style="font-family:'Google Sans',sans-serif;font-size:1.1rem;font-weight:500;color:var(--text);">안녕하세요, {{ username }}님!</div>
        <div style="font-size:0.85rem;color:var(--text-secondary);margin-top:2px;">얼굴 인식으로 로그인되었습니다.</div>
      </div>
    </div>

    <!-- 메뉴 카드 그리드 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
      <a href="{% url 'workout' %}" style="text-decoration:none;">
        <div style="background:var(--blue);border-radius:8px;padding:24px 20px;color:#fff;transition:box-shadow .15s;" onmouseover="this.style.boxShadow='var(--shadow-hover)'" onmouseout="this.style.boxShadow='none'">
          <div style="font-size:1.8rem;margin-bottom:10px;">🏋️</div>
          <div style="font-family:'Google Sans',sans-serif;font-size:1rem;font-weight:500;">운동 시작</div>
          <div style="font-size:0.8rem;opacity:.85;margin-top:4px;">자세 분석 및 점수 측정</div>
        </div>
      </a>
      <a href="/workout/feedback/" style="text-decoration:none;">
        <div style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:24px 20px;color:var(--text);transition:box-shadow .15s;" onmouseover="this.style.boxShadow='var(--shadow-hover)'" onmouseout="this.style.boxShadow='none'">
          <div style="font-size:1.8rem;margin-bottom:10px;">📊</div>
          <div style="font-family:'Google Sans',sans-serif;font-size:1rem;font-weight:500;">피드백 보기</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;">운동 기록 및 점수 분석</div>
        </div>
      </a>
      <a href="{% url 'register' %}" style="text-decoration:none;">
        <div style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:24px 20px;color:var(--text);transition:box-shadow .15s;" onmouseover="this.style.boxShadow='var(--shadow-hover)'" onmouseout="this.style.boxShadow='none'">
          <div style="font-size:1.8rem;margin-bottom:10px;">➕</div>
          <div style="font-family:'Google Sans',sans-serif;font-size:1rem;font-weight:500;">얼굴 등록</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;">새 사용자 얼굴 추가</div>
        </div>
      </a>
      <a href="{% url 'manage' %}" style="text-decoration:none;">
        <div style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:24px 20px;color:var(--text);transition:box-shadow .15s;" onmouseover="this.style.boxShadow='var(--shadow-hover)'" onmouseout="this.style.boxShadow='none'">
          <div style="font-size:1.8rem;margin-bottom:10px;">⚙️</div>
          <div style="font-family:'Google Sans',sans-serif;font-size:1rem;font-weight:500;">설정</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;">앱 설정 및 사용자 관리</div>
        </div>
      </a>
    </div>


  </div>
</div>
{% endblock %}
